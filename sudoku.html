<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سودوكو احترافي - PiGamesHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .grid-container { display: grid; grid-template-columns: repeat(9, 1fr); border: 2px solid #4c1d95; width: 100%; max-width: 360px; margin: 0 auto; }
        .cell { aspect-ratio: 1; border: 0.5px solid #cbd5e1; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; background: white; }
        .cell:nth-child(3n) { border-right: 2px solid #4c1d95; }
        .cell:nth-child(9n) { border-right: 0.5px solid #cbd5e1; }
        .row-border { border-bottom: 2px solid #4c1d95; }
        .selected { background: #ddd6fe !important; }
        .fixed { color: #1e1b4b; background: #f1f5f9; cursor: default; }
    </style>
</head>
<body class="bg-gray-50 p-4">

    <div class="max-w-sm mx-auto">
        <a href="index.html" class="text-purple-700 font-bold mb-4 block">← رجوع</a>
        <div id="grid" class="grid-container shadow-xl"></div>
        <div class="grid grid-cols-5 gap-2 mt-6">
            <script>
                for(let i=1; i<=9; i++) document.write(`<button onclick="handleInput(${i})" class="bg-purple-600 text-white p-3 rounded font-bold">${i}</button>`);
            </script>
            <button onclick="handleInput(0)" class="bg-red-500 text-white p-3 rounded font-bold col-span-2">مسح</button>
        </div>
    </div>

    <script>
        // خوارزمية توليد شبكة سودوكو بسيطة (لأغراض العرض)
        let board = [
            [5,3,0,0,7,0,0,0,0],[6,0,0,1,9,5,0,0,0],[0,9,8,0,0,0,0,6,0],
            [8,0,0,0,6,0,0,0,3],[4,0,0,8,0,3,0,0,1],[7,0,0,0,2,0,0,0,6],
            [0,6,0,0,0,0,2,8,0],[0,0,0,4,1,9,0,0,5],[0,0,0,0,8,0,0,7,9]
        ];

        let selected = {r:0, c:0};

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            board.forEach((row, r) => {
                row.forEach((val, c) => {
                    const cell = document.createElement('div');
                    cell.className = `cell ${val !== 0 ? 'fixed' : ''} ${selected.r==r && selected.c==c ? 'selected' : ''}`;
                    if((r+1)%3 === 0 && r < 8) cell.classList.add('row-border');
                    cell.innerText = val !== 0 ? val : '';
                    cell.onclick = () => { if(val === 0) { selected = {r,c}; render(); } };
                    grid.appendChild(cell);
                });
            });
        }

        function handleInput(num) {
            if(board[selected.r][selected.c] === 0) {
                board[selected.r][selected.c] = num;
                render();
            }
        }
        render();
    </script>
</body>
</html>
