<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لعبة السودوكو - PiGamesHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .grid-container { display: grid; grid-template-columns: repeat(9, 1fr); border: 2px solid #4c1d95; width: 100%; max-width: 360px; margin: 0 auto; background: white; }
        .cell { aspect-ratio: 1; border: 0.5px solid #e2e8f0; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.2rem; }
        .cell:nth-child(3n) { border-right: 2px solid #4c1d95; }
        .cell:nth-child(9n) { border-right: 0.5px solid #e2e8f0; }
        .row-border { border-bottom: 2px solid #4c1d95; }
        .selected { background: #ddd6fe !important; }
    </style>
</head>
<body class="bg-gray-50 p-4">

    <header class="flex justify-between items-center mb-6 max-w-sm mx-auto">
        <a href="index.html" class="text-purple-700 font-bold">← رجوع</a>
        <h1 class="font-bold">سودوكو</h1>
        <select id="difficulty" class="bg-white border rounded p-1 text-sm">
            <option value="easy">سهل</option>
            <option value="medium">متوسط</option>
            <option value="hard">صعب</option>
        </select>
    </header>

    <div id="grid" class="grid-container shadow-xl"></div>

    <div class="grid grid-cols-5 gap-2 max-w-sm mx-auto mt-6">
        <script>
            for(let i=1; i<=9; i++) document.write(`<button onclick="insert(${i})" class="bg-purple-600 text-white p-3 rounded font-bold">${i}</button>`);
        </script>
        <button onclick="clearCell()" class="bg-red-500 text-white p-3 rounded col-span-2 font-bold">مسح</button>
    </div>

    <script>
        let selectedCell = null;
        const grid = document.getElementById('grid');
        
        // بناء الشبكة
        for(let r=0; r<9; r++) {
            for(let c=0; c<9; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                if((r+1)%3 === 0 && r < 8) cell.classList.add('row-border');
                cell.onclick = () => { 
                    document.querySelectorAll('.cell').forEach(el => el.classList.remove('selected'));
                    cell.classList.add('selected');
                    selectedCell = {r, c};
                };
                grid.appendChild(cell);
            }
        }

        function insert(num) {
            if(selectedCell) {
                const cells = document.querySelectorAll('.cell');
                cells[selectedCell.r * 9 + selectedCell.c].innerText = num;
            }
        }

        function clearCell() {
            if(selectedCell) {
                const cells = document.querySelectorAll('.cell');
                cells[selectedCell.r * 9 + selectedCell.c].innerText = '';
            }
        }
    </script>
</body>
</html>
