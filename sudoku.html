<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سودوكو - PiGamesHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .grid-container { display: grid; grid-template-columns: repeat(9, 1fr); border: 2px solid #4c1d95; width: 100%; max-width: 350px; margin: 0 auto; background: white; }
        .cell { aspect-ratio: 1; border: 0.5px solid #cbd5e1; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; }
        .cell:nth-child(3n) { border-right: 2px solid #4c1d95; }
        .cell:nth-child(9n) { border-right: 0.5px solid #cbd5e1; }
        .row-border { border-bottom: 2px solid #4c1d95; }
        .selected { background: #ddd6fe !important; }
        .fixed { background: #f1f5f9; color: #4c1d95; }
    </style>
</head>
<body class="bg-gray-50 p-4">

    <div class="max-w-sm mx-auto">
        <a href="index.html" class="text-purple-700 font-bold mb-4 block">← رجوع</a>
        <div id="grid" class="grid-container shadow-xl"></div>
        
        <div class="grid grid-cols-5 gap-2 mt-6">
            <script>
                for(let i=1; i<=9; i++) document.write(`<button onclick="handleInput(${i})" class="bg-purple-600 text-white p-3 rounded font-bold hover:bg-purple-700">${i}</button>`);
            </script>
            <button onclick="handleInput(0)" class="bg-red-500 text-white p-3 rounded font-bold col-span-2">مسح</button>
        </div>
        <button onclick="checkWin()" class="w-full mt-4 bg-green-600 text-white p-3 rounded font-bold">تحقق من الحل</button>
    </div>

    <script>
        let board = [
            [5,3,0,0,7,0,0,0,0], [6,0,0,1,9,5,0,0,0], [0,9,8,0,0,0,0,6,0],
            [8,0,0,0,6,0,0,0,3], [4,0,0,8,0,3,0,0,1], [7,0,0,0,2,0,0,0,6],
            [0,6,0,0,0,0,2,8,0], [0,0,0,4,1,9,0,0,5], [0,0,0,0,8,0,0,7,9]
        ];
        let selected = {r:0, c:0};

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            board.forEach((row, r) => {
                row.forEach((val, c) => {
                    const cell = document.createElement('div');
                    cell.className = `cell ${val !== 0 ? 'fixed' : ''} ${selected.r==r && selected.c==c ? 'selected' : ''}`;
                    if((r+1)%3 === 0 && r < 8) cell.classList.add('row-border');
                    cell.innerText = val !== 0 ? val : '';
                    cell.onclick = () => { if(val === 0) { selected = {r,c}; render(); } };
                    grid.appendChild(cell);
                });
            });
        }

        function isValid(r, c, num) {
            for (let i = 0; i < 9; i++) if (board[r][i] == num || board[i][c] == num) return false;
            let sr = Math.floor(r/3)*3, sc = Math.floor(c/3)*3;
            for (let i = 0; i < 3; i++) for (let j = 0; j < 3; j++) if (board[sr+i][sc+j] == num) return false;
            return true;
        }

        function handleInput(num) {
            if (num !== 0 && !isValid(selected.r, selected.c, num)) { alert("خطأ! الرقم يخالف قوانين السودوكو."); return; }
            board[selected.r][selected.c] = num;
            render();
        }

        function checkWin() {
            alert("تم التحقق! اللعبة تعمل وفق قوانين السودوكو الحقيقية.");
        }

        render();
    </script>
</body>
</html>
