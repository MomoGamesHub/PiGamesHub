<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سودوكو | PiGamesHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .sudoku-cell { aspect-ratio: 1; border: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; }
        .sudoku-cell:nth-child(3n) { border-right: 2px solid #4c1d95; }
        .row-border { border-bottom: 2px solid #4c1d95; }
        .selected { background-color: #ede9fe !important; outline: 2px solid #6d28d9; }
    </style>
</head>
<body class="bg-slate-50 p-4">

    <a href="index.html" class="flex items-center text-purple-700 font-bold mb-6">
        <span class="ml-2">←</span> العودة للرئيسية
    </a>

    <div class="max-w-sm mx-auto bg-white p-6 rounded-3xl shadow-sm">
        <h2 class="text-xl font-bold text-center mb-6">تحدي السودوكو</h2>
        
        <div id="grid" class="grid grid-cols-9 border-2 border-purple-900 mb-6"></div>
        
        <div class="grid grid-cols-5 gap-2">
            <button onclick="insert(1)" class="bg-purple-100 p-3 rounded-lg font-bold">1</button>
            <button onclick="insert(2)" class="bg-purple-100 p-3 rounded-lg font-bold">2</button>
            <button onclick="insert(3)" class="bg-purple-100 p-3 rounded-lg font-bold">3</button>
            <button onclick="insert(0)" class="bg-red-100 p-3 rounded-lg font-bold col-span-2">مسح</button>
        </div>
    </div>

    <script>
        // منطق بسيط للشبكة
        const grid = document.getElementById('grid');
        for(let i=0; i<81; i++) {
            const cell = document.createElement('div');
            cell.className = 'sudoku-cell';
            if(Math.floor(i/9) == 2 || Math.floor(i/9) == 5) cell.classList.add('row-border');
            cell.onclick = () => { /* منطق الاختيار */ };
            grid.appendChild(cell);
        }
        function insert(num) { alert("تم إضافة الرقم: " + num); }
    </script>
</body>
</html>
