<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>PiGamesHub - Sudoku</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .cell { aspect-ratio: 1; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .cell:nth-child(3n) { border-right: 2px solid black; }
        .row-border { border-bottom: 2px solid black; }
        .selected { background: #d8b4fe !important; }
    </style>
</head>
<body class="bg-slate-50 p-4">

    <div id="main-ui" class="space-y-6 text-center">
        <h1 class="text-2xl font-bold text-purple-900">مرحباً يا أحمد</h1>
        <button onclick="showSudoku()" class="w-full p-6 bg-white rounded-2xl shadow hover:bg-purple-50 transition">ابدأ لعبة السودوكو</button>
    </div>

    <div id="game-ui" class="hidden">
        <button onclick="backToHome()" class="mb-4 text-gray-600 font-bold">← رجوع</button>
        <div id="grid" class="grid grid-cols-9 border-2 border-black max-w-sm mx-auto bg-white"></div>
        <div class="grid grid-cols-5 gap-2 mt-6 max-w-sm mx-auto">
            <button onclick="insert(1)" class="bg-purple-600 text-white p-3 rounded">1</button>
            <button onclick="insert(2)" class="bg-purple-600 text-white p-3 rounded">2</button>
            <button onclick="insert(3)" class="bg-purple-600 text-white p-3 rounded">3</button>
            <button onclick="checkWin()" class="bg-green-600 text-white p-3 rounded col-span-2">تحقق</button>
        </div>
    </div>

    <script>
        let selected = null;
        let board = Array(9).fill().map(() => Array(9).fill(0));

        function showSudoku() {
            document.getElementById('main-ui').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            renderGrid();
        }

        function backToHome() {
            document.getElementById('game-ui').classList.add('hidden');
            document.getElementById('main-ui').classList.remove('hidden');
        }

        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for(let r=0; r<9; r++) {
                for(let c=0; c<9; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if((r+1)%3===0 && r<8) cell.classList.add('row-border');
                    cell.onclick = () => { selected = {r,c}; renderGrid(); };
                    if(selected && selected.r === r && selected.c === c) cell.classList.add('selected');
                    cell.innerText = board[r][c] || '';
                    grid.appendChild(cell);
                }
            }
        }

        function insert(num) {
            if(selected) {
                board[selected.r][selected.c] = num;
                renderGrid();
            }
        }

        function checkWin() {
            alert("تم التحقق من الحل!");
        }
    </script>
</body>
</html>
