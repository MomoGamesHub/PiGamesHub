<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PiGamesHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; }
        .pi-card { background: white; border-radius: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .pi-gradient { background: linear-gradient(135deg, #6d28d9 0%, #4c1d95 100%); }
    </style>
</head>
<body class="p-4">

    <header class="flex justify-between items-center mb-8">
        <div>
            <p class="text-gray-500 text-sm">مرحباً</p>
            <h1 class="text-xl font-bold text-gray-800">أحمد محمد</h1>
        </div>
        <div class="w-10 h-10 rounded-full bg-purple-100 flex items-center justify-center">
            <span class="text-purple-700 font-bold">12</span>
        </div>
    </header>

    <div class="pi-gradient text-white p-6 rounded-3xl mb-8">
        <p class="text-purple-200 text-sm">رصيد Pi الحالي</p>
        <h2 class="text-3xl font-bold">125.56 <span class="text-lg font-normal">Pi</span></h2>
    </div>

    <div class="grid grid-cols-2 gap-4">
        <div class="pi-card p-5 border-2 border-purple-100 hover:border-purple-300 transition cursor-pointer" onclick="window.location.href='/sudoku.html'">
            <div class="w-12 h-12 bg-purple-100 rounded-2xl mb-4 flex items-center justify-center text-2xl">🧩</div>
            <h3 class="font-bold text-gray-800">سودوكو</h3>
            <p class="text-xs text-gray-500">تحدي الذكاء</p>
        </div>

        <div class="pi-card p-5 border-2 border-gray-100 opacity-60">
            <div class="w-12 h-12 bg-gray-100 rounded-2xl mb-4 flex items-center justify-center text-2xl">🎮</div>
            <h3 class="font-bold text-gray-800">المزيد</h3>
            <p class="text-xs text-gray-500">قريباً...</p>
        </div>
    </div>

</body>
</html>
