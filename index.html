<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>PiGamesHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4">
    <div id="main-ui" class="space-y-6">
        <h1 class="text-2xl font-bold text-center">أهلاً بك يا أحمد</h1>
        <div class="grid grid-cols-2 gap-4">
            <button onclick="showSudoku()" class="p-6 bg-white rounded-2xl shadow">لعبة السودوكو</button>
        </div>
    </div>

    <div id="game-ui" class="hidden">
        <button onclick="backToHome()" class="mb-4 text-purple-600 font-bold">← رجوع</button>
        <div id="sudoku-board" class="bg-white p-4 rounded-xl shadow-lg">
            <h2 class="text-xl font-bold mb-4">لعبة السودوكو</h2>
            <div id="grid" class="grid grid-cols-9 border-2 border-black w-full max-w-xs mx-auto">
                </div>
        </div>
    </div>

    <script>
        function showSudoku() {
            document.getElementById('main-ui').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            // هنا ستستدعي دالة توليد اللعبة التي كتبناها سابقاً
        }

        function backToHome() {
            document.getElementById('game-ui').classList.add('hidden');
            document.getElementById('main-ui').classList.remove('hidden');
        }
    </script>
</body>
</html>
